name: Deploy React to GitHub Pages

on:
  push:
    branches:
      - main # 如果你的主分支叫 master，请改为 master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22 # 可以根据你的 Node 版本进行修改
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        # 如果是 Vite 项目，打包目录默认是 dist；如果是 CRA 项目，请把下面的 dist 改为 build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 如果是 Vite 项目填 dist；如果是 CRA 项目请填 build
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
